# PLAGENOR Nginx Configuration
# =============================================================================
# This configuration is optimized for Django with HTMX support.
# Place this file in /etc/nginx/sites-available/plagenor
# Then symlink: ln -s /etc/nginx/sites-available/plagenor /etc/nginx/sites-enabled/
#
# After updating, test and reload nginx:
#   sudo nginx -t
#   sudo systemctl reload nginx
# =============================================================================

upstream plagenor_app {
    # Unix socket for Gunicorn
    server unix:/run/plagenor/plagenor.sock fail_timeout=0;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

# Main server block (HTTP -> HTTPS redirect)
server {
    listen 80;
    server_name plagenor.essbo.dz www.plagenor.essbo.dz;

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name plagenor.essbo.dz www.plagenor.essbo.dz;

    # SSL Configuration (use Let's Encrypt certificates)
    ssl_certificate /etc/letsencrypt/live/plagenor.essbo.dz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plagenor.essbo.dz/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (uncomment when certificates are ready)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # HSTS (uncomment after confirming HTTPS works)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Root directory
    root /opt/plagenor;
    index index.html;

    # Logs
    access_log /var/log/nginx/plagenor_access.log;
    error_log /var/log/nginx/plagenor_error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_disable "MSIE [1-6]\.";

    # Rate limiting for general requests
    limit_req zone=general burst=50 nodelay;
    
    # Stricter rate limiting for login endpoint
    location ~ ^/accounts/login/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://plagenor_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (cached with long expiry)
    location /static/ {
        alias /opt/plagenor/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Security: prevent executable uploads
        location ~* \.(php|jsp|asp|aspx|cgi|pl|py|sh)$ {
            deny all;
        }
    }

    # Media files
    location /media/ {
        alias /opt/plagenor/media/;
        expires 7d;
        add_header Cache-Control "public";
        
        # Security: prevent executable uploads
        location ~* \.(php|jsp|asp|aspx|cgi|pl|py|sh)$ {
            deny all;
        }
    }

    # Health check endpoint (no rate limiting)
    location /health/ {
        proxy_pass http://plagenor_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Django application
    location / {
        proxy_pass http://plagenor_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Block access to sensitive files
    location ~ /\.(?!well-known) {
        deny all;
    }
    
    location ~ /\. {
        deny all;
    }

    # Block access to version control
    location ~ /\.git {
        deny all;
    }
    
    location ~ /\.svn {
        deny all;
    }
}
