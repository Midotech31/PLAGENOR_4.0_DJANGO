# =============================================================================
# PostgreSQL Configuration for PLAGENOR
# =============================================================================
# This is a production-optimized postgresql.conf for PLAGENOR Django application.
# These settings are tuned for typical laboratory information management workloads.
#
# Copy this file to: /etc/postgresql/16/main/postgresql.conf
# (adjust path based on your PostgreSQL version)
#
# After modifying, reload PostgreSQL:
#   sudo systemctl reload postgresql
# =============================================================================

#------------------------------------------------------------------------------
# VERSION AND PLATFORM
#------------------------------------------------------------------------------

listen_addresses = '*'
port = 5432
max_connections = 100

#------------------------------------------------------------------------------
# MEMORY SETTINGS
# Based on available RAM. Adjust shared_buffers to 25% of system RAM.
# For 4GB RAM server:
#   shared_buffers = 1GB
#   effective_cache_size = 3GB
#   work_mem = 10MB
#------------------------------------------------------------------------------

shared_buffers = 1GB                    # 25% of RAM, adjust for your server
effective_cache_size = 3GB              # 75% of RAM
work_mem = 10MB                         # Per sort/hash operation
maintenance_work_mem = 256MB           # For VACUUM, CREATE INDEX, etc.
max_stack_depth = 6MB

#------------------------------------------------------------------------------
# PARALLELISM & QUERY PLANNING
#------------------------------------------------------------------------------

max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
parallel_leader_participation = on

#------------------------------------------------------------------------------
# WRITE AHEAD LOG (WAL) SETTINGS
#------------------------------------------------------------------------------

wal_level = replica                     # Enable WAL for replication/archiving
max_wal_size = 2GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9
wal_buffers = 16MB
wal_writer_delay = 200ms
checkpoint_timeout = 15min

#------------------------------------------------------------------------------
# REPLICATION & ARCHIVING
# Enable for Point-in-Time Recovery (PITR)
#------------------------------------------------------------------------------

#wal_level = replica                    # Already set above
archive_mode = on                      # Enable archiving
archive_command = '/bin/true'         # Placeholder - set actual command in deploy script
archive_timeout = 300                  # Force archive every 5 minutes if inactive

# For streaming replication (if needed later)
#max_wal_senders = 3
#wal_keep_size = 1GB
#hot_standby = on

#------------------------------------------------------------------------------
# LOGGING
#------------------------------------------------------------------------------

log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000     # Log queries > 1 second
log_line_prefix = '%t [%p] [%l-1] %u@%d '
log_timezone = 'Africa/Algiers'

# Log what to log
log_connections = on
log_disconnections = on
log_duration = off
log_line_prefix = '%m [%p] %q%u@%d '
log_lock_waits = on
log_temp_files = 0                     # Log temp files > 0 KB
log_autovacuum_min_duration = 0

#------------------------------------------------------------------------------
# PROCESSING
#------------------------------------------------------------------------------

deadlock_timeout = 1s
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64
max_prepared_transactions = 0          # Set > 0 if using prepared transactions

#------------------------------------------------------------------------------
# VACUUM
#------------------------------------------------------------------------------

vacuum_cost_delay = 0
vacuum_cost_page_hit = 1
vacuum_cost_page_miss = 10
vacuum_cost_page_dirty = 20
vacuum_cost_limit = 1000
autovacuum_max_workers = 3
autovacuum_naptime = 1min

#------------------------------------------------------------------------------
# STATISTICS
#------------------------------------------------------------------------------

# Activity statistics
track_activities = on
track_activity_query_size = 4096
track_counts = on
track_io_timing = on
track_functions = pl

# Statistics monitoring
stats_fetch_regularity = 1

#------------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
#------------------------------------------------------------------------------

datestyle = 'iso, dmy'
timezone = 'Africa/Algiers'
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'
default_text_search_config = 'pg_catalog.english'

#------------------------------------------------------------------------------
# LOCK MANAGEMENT
#------------------------------------------------------------------------------

#------------------------------------------------------------------------------
# ERROR HANDLING
#------------------------------------------------------------------------------

exit_on_error = off
restart_after_crash = on
#------------------------------------------------------------------------------

#------------------------------------------------------------------------------
# CUSTOM OPTIONS
# Add here any custom configuration options
#------------------------------------------------------------------------------

# Connection pooling settings (managed by PgBouncer, not here)
# This is just informational
# pg_bouncer.default_pool_size = 25
# pg_bouncer.max_client_conn = 100
