; =============================================================================
; PgBouncer Configuration for PLAGENOR
; =============================================================================
; PgBouncer is a lightweight connection pooler for PostgreSQL.
; It reduces the overhead of many client connections by reusing server connections.
;
; Installation:
;   sudo apt install pgbouncer
;
; Copy this file to: /etc/pgbouncer/pgbouncer.ini
;
; Setup auth:
;   echo "postgres" > /etc/pgbouncer/userlist.txt
;   psql -h localhost -U postgres -c "CREATE USER pgbouncer WITH PASSWORD 'your_password';"
;   psql -h localhost -U postgres -c "ALTER USER postgres WITH PASSWORD 'your_password';"
;   echo '"postgres" "your_password"' >> /etc/pgbouncer/userlist.txt
;   echo '"pgbouncer" "your_password"' >> /etc/pgbouncer/userlist.txt
;
; Enable and start:
;   sudo systemctl enable pgbouncer
;   sudo systemctl start pgbouncer
; =============================================================================

[databases]
; PLAGENOR database
plagenor = host=localhost port=5432 dbname=plagenor

; Template for additional databases
; app2 = host=localhost port=5432 dbname=app2

[pgbouncer]
; Connection settings
listen_addr = 127.0.0.1
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer
socket_permissions = 0770

; Auth settings
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename = $1

; Pool settings - OPTIMIZED FOR DJANGO
; Django opens multiple connections for each request (ORM, admin, etc.)
; Pool size should accommodate peak concurrent requests
pool_mode = transaction
max_client_conn = 200
default_pool_size = 25              ; Connections per database/user
min_pool_size = 5                   ; Always maintain these connections
reserve_pool_size = 10              ; Extra connections for spikes
reserve_pool_timeout = 5            ; Wait this long before grabbing reserve pool

; Timeouts (in seconds)
query_wait_timeout = 30             ; Max time a client waits for a query
idle_transaction_timeout = 600      ; Close idle transaction after 10 min
server_login_retry = 5              ; Seconds between login retries
server_lifetime = 3600              ; Close server connection after 1 hour
server_idle_timeout = 600           ; Close idle server after 10 min

; Connection validation
server_reset_query = DISCARD ALL    ; Reset state between transactions
server_check_delay = 30             ; Check server health every 30 sec
server_check_query = SELECT 1       ; Simple health check
server_fast_close = off             ; Don't close server on client disconnect

; Logging
log_connections = 0                ; Too noisy, disable
log_disconnections = 0              ; Too noisy, disable
log_pooler_errors = 1
log_stats = 1
stats_period = 60                   ; Log stats every 60 seconds

; Syslog
syslog = 0

; Performance tuning
pkt_buf = 4096
listen_backlog = 4096
sbuf_loopcnt = 5
sbuf_oom = 1                        ; Allow OOM for busy servers

; DNS
dns_max_ttl = 15
dns_zone_split = 0

; Console access (for debugging)
admin_users = postgres
stats_users = postgres, monitoring

; Replication lag (for streaming replication monitoring)
ignore_startup_parameters = extra_float_digits
