{% load static %}
{% load i18n %}

<header class="topbar">
    <div class="topbar-left">
        <button class="topbar-hamburger" onclick="toggleSidebar()" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="topbar-title">{% block page_title %}{% trans "Tableau de bord" %}{% endblock %}</h1>
    </div>
    <div class="topbar-right">
        <div class="topbar-search">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="{% trans 'Rechercher...' %}" />
        </div>
        <button class="topbar-bell" onclick="refreshNotificationCount()" aria-label="Notifications">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="badge" id="notification-count" style="display:none">0</span>
        </button>
        <div class="topbar-user">
            <div class="topbar-avatar">{{ user.first_name|first|default:"U" }}{{ user.last_name|first|default:"" }}</div>
        </div>

        <!-- Language Switch -->
        <form method="post" action="{% url 'set_language' %}" style="display:inline;">
            {% csrf_token %}
            <input type="hidden" name="language" value="{% if LANGUAGE_CODE == 'fr' %}en{% else %}fr{% endif %}">
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <button type="submit" class="topbar-btn" title="{% if LANGUAGE_CODE == 'fr' %}English{% else %}Français{% endif %}">
                🌐 {% if LANGUAGE_CODE == 'fr' %}EN{% else %}FR{% endif %}
            </button>
        </form>

        <!-- Logout -->
        <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="topbar-btn topbar-logout" title="{% trans 'Déconnexion' %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </form>
    </div>
</header>
