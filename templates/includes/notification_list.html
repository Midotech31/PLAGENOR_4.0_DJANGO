{% if notifications %}
<div class="card">
    <div class="card-header">
        <h3>Notifications</h3>
        <span class="badge-status info">{{ notifications|length }}</span>
    </div>
    <div class="card-body">
        {% for notif in notifications %}
        <div class="data-card-row" style="padding: 0.5rem 0; border-bottom: 1px solid var(--slate-100);">
            <span class="text-sm">{{ notif.message }}</span>
            <span class="text-xs text-muted">{{ notif.created_at|timesince }} ago</span>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
